<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Mensual - Micuadre</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #334155;
        }
        h2 { margin-top: 0; color: #ec4899; }
        label { display: block; text-align: left; margin-bottom: 8px; font-size: 0.9rem; color: #94a3b8; }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 2px solid #334155;
            background-color: #0f172a;
            color: white;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            text-transform: uppercase;
        }
        input:focus { border-color: #ec4899; }
        button {
            background-color: #ec4899;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover { background-color: #db2777; }
        .result-box {
            margin-top: 20px;
            padding: 20px;
            background-color: #064e3b;
            color: #4ade80;
            border-radius: 10px;
            font-family: monospace;
            font-size: 1.2rem;
            word-break: break-all;
            display: none;
            border: 1px dashed #4ade80;
        }
        .copy-hint { font-size: 0.8rem; margin-top: 5px; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🔐 Generador Mensual</h2>
        <p style="font-size:0.9rem; color:#cbd5e1; margin-bottom:20px;">
            Herramienta exclusiva para Administrador.
        </p>

        <label>ID de Instalación:</label>
        <input type="text" id="client-id" placeholder="Ej: A1B2-C3D4" autocomplete="off">

        <label>Código de Solicitud (Mensual):</label>
        <input type="text" id="request-code" placeholder="Ej: 1234" autocomplete="off">

        <button onclick="generate()">Generar Clave de Renovación</button>

        <div id="result" class="result-box">
            <div id="key-display"></div>
            <div class="copy-hint">Clave válida por 30 días</div>
        </div>
    </div>

    <script>
        function generate() {
            const installId = document.getElementById('client-id').value.trim();
            const requestCode = document.getElementById('request-code').value.trim();
            const resultBox = document.getElementById('result');
            const keyDisplay = document.getElementById('key-display');

            if (!installId || !requestCode) {
                alert("Por favor ingresa AMBOS códigos");
                return;
            }

            // ALGORITMO SECRETO (Debe coincidir con index.html)
            const secret = "HAROLD_SECURE";
            try {
                // Generar clave dinámica: Base64(ID + Request + SECRETO) invertido
                const dataString = installId + requestCode + secret;
                const key = btoa(dataString).split('').reverse().join('');
                
                keyDisplay.innerText = key;
                resultBox.style.display = 'block';
            } catch (e) {
                alert("Error generando clave.");
            }
        }
    </script>

</body>

</html>
